<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuntikaavio – Lyk lukkarintekijä</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a5c38;
    --green-light: #e8f2ec;
    --green-mid: #2d7a4f;
    --gold: #c8a84b;
    --bg: #f4f1eb;
    --white: #ffffff;
    --gray: #6b6b6b;
    --border: #c8c2b4;
    --text: #1a1a1a;
    --cell-bg: #ffffff;
    --highlight: #fff8e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .school-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--green);
    color: white;
    padding: 10px 24px 10px 16px;
    border-radius: 60px;
    margin-bottom: 1.5rem;
  }

  .badge-icon {
    width: 38px;
    height: 38px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
  }

  .school-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }

  h1 {
    font-size: clamp(28px, 6vw, 46px);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--green);
    line-height: 1;
    margin-bottom: 6px;
  }

  .header-sub {
    font-size: 14px;
    color: var(--gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  /* TABLE */
  .table-wrap {
    background: var(--white);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 2rem;
  }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  th {
    background: var(--green);
    color: white;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 8px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.15);
  }

  th:first-child {
    text-align: left;
    padding-left: 16px;
    min-width: 110px;
  }

  td {
    border: 1px solid var(--border);
    padding: 0;
    text-align: center;
    vertical-align: middle;
  }

  td.row-label {
    background: var(--green-light);
    text-align: left;
    padding: 10px 14px;
    border-right: 2px solid var(--border);
  }

  .tunti-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    display: block;
  }

  .tunti-klo {
    font-size: 11px;
    color: var(--gray);
    display: block;
    margin-top: 1px;
  }

  .cell-input {
    width: 100%;
    height: 58px;
    border: none;
    background: var(--cell-bg);
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    cursor: default;
    display: block;
    transition: background 0.15s;
  }

  td.ma-merged {
    padding: 0;
    vertical-align: top;
  }

  .ma-merged .cell-input {
    height: 58px;
    border-bottom: 1px solid var(--border);
    display: block;
  }

  .ma-merged .cell-input:last-child {
    border-bottom: none;
  }

  /* EDIT PANEL */
  .edit-section {
    background: var(--white);
    border-radius: 16px;
    border: 1.5px solid var(--border);
    padding: 1.5rem;
  }

  .edit-section h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }

  .edit-section p {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 1.25rem;
  }

  .tokens-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }

  .token-card {
    background: var(--green-light);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .token-card:focus-within {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,122,79,0.15);
  }

  .token-og {
    font-size: 11px;
    color: var(--gray);
    flex-shrink: 0;
    min-width: 30px;
  }

  .token-og span {
    display: block;
    font-size: 16px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--green);
    line-height: 1;
  }

  .token-arrow {
    color: var(--border);
    font-size: 14px;
    flex-shrink: 0;
  }

  .token-edit {
    flex: 1;
    border: none;
    background: var(--white);
    border-radius: 6px;
    padding: 4px 6px;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    min-width: 0;
    outline: none;
  }

  .token-count {
    font-size: 10px;
    color: var(--gray);
    margin-top: 2px;
  }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 12px;
    color: var(--gray);
  }

  @media (max-width: 600px) {
    th:first-child { min-width: 80px; padding-left: 10px; }
    .cell-input { font-size: 17px; height: 48px; }
    .ma-merged .cell-input { height: 48px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    
    </div>
    <h1>LYK TUNTIKAAVIO</h1>
    <p class="header-sub">Oppitunnin pituus 75 min.</p>
  </header>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tunti</th>
          <th>MA</th>
          <th>TI</th>
          <th>KE</th>
          <th>TO</th>
          <th>PE</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="row-label">
            <span class="tunti-num">1. tunti</span>
            <span class="tunti-klo">klo 8.00</span>
          </td>
          <td><input class="cell-input" data-token="A" readonly></td>
          <td><input class="cell-input" data-token="1" readonly></td>
          <td><input class="cell-input" data-token="B" readonly></td>
          <td><input class="cell-input" data-token="6" readonly></td>
          <td><input class="cell-input" data-token="C" readonly></td>
        </tr>
        <tr>
          <td class="row-label">
            <span class="tunti-num">2. tunti</span>
            <span class="tunti-klo">klo 9.30</span>
          </td>
          <td><input class="cell-input" data-token="1" readonly></td>
          <td><input class="cell-input" data-token="4" readonly></td>
          <td><input class="cell-input" data-token="4" readonly></td>
          <td><input class="cell-input" data-token="1" readonly></td>
          <td><input class="cell-input" data-token="4" readonly></td>
        </tr>
        <tr>
          <td class="row-label">
            <span class="tunti-num">3. tunti</span>
            <span class="tunti-klo">klo 11.00</span>
          </td>
          <td><input class="cell-input" data-token="2" readonly></td>
          <td><input class="cell-input" data-token="5" readonly></td>
          <td><input class="cell-input" data-token="2" readonly></td>
          <td><input class="cell-input" data-token="2" readonly></td>
          <td><input class="cell-input" data-token="5" readonly></td>
        </tr>
        <tr>
          <td class="row-label">
            <span class="tunti-num">4. tunti</span>
            <span class="tunti-klo">klo 13.00</span>
            <span class="tunti-klo">ma klo 13.15</span>
          </td>
          <td class="ma-merged" rowspan="2">
            <input class="cell-input" data-token="3" readonly>
            <input class="cell-input" data-token="6" readonly>
          </td>
          <td><input class="cell-input" data-token="3" readonly></td>
          <td><input class="cell-input" data-token="5" readonly></td>
          <td><input class="cell-input" data-token="3" readonly></td>
          <td><input class="cell-input" data-token="F" readonly></td>
        </tr>
        <tr>
          <td class="row-label">
            <span class="tunti-num">5. tunti</span>
            <span class="tunti-klo">klo 14.30</span>
            <span class="tunti-klo">ma klo 14.45</span>
          </td>
          <td><input class="cell-input" data-token="D" readonly></td>
          <td><input class="cell-input" data-token="6" readonly></td>
          <td><input class="cell-input" data-token="E" readonly></td>
          <td><input class="cell-input" data-token="G" readonly></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="edit-section">
    <h2>Muokkaa tunnuksia</h2>
    <p>Kirjoita sarakkeeseen kurssin tunnus</p>
    <div class="tokens-grid" id="tokens-grid"></div>
  </div>

  <footer>2026 Clauden avustuksella · Tuntikaavion tekijä</footer>
</div>

<script>
  const ORDER = ['A','B','C','D','E','F','G','1','2','3','4','5','6'];
  const values = {};
  ORDER.forEach(t => values[t] = t);

  function renderCells() {
    document.querySelectorAll('.cell-input').forEach(inp => {
      const tok = inp.dataset.token;
      inp.value = values[tok] !== undefined ? values[tok] : tok;
    });
  }

  function buildPanel() {
    const grid = document.getElementById('tokens-grid');
    grid.innerHTML = '';

    const allTokens = [...new Set(
      [...document.querySelectorAll('.cell-input')].map(i => i.dataset.token)
    )].sort((a, b) => {
      const ia = ORDER.indexOf(a), ib = ORDER.indexOf(b);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return 1;
      return a.localeCompare(b);
    });

    allTokens.forEach(tok => {
      const count = document.querySelectorAll(`.cell-input[data-token="${tok}"]`).length;
      const card = document.createElement('div');
      card.className = 'token-card';
      card.innerHTML = `
        <div class="token-og">
          <span>${tok}</span>
          <div class="token-count">${count} tuntia</div>
        </div>
        <div class="token-arrow">→</div>
        <input class="token-edit" data-edit="${tok}" value="${values[tok]}" maxlength="8">
      `;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.token-edit').forEach(inp => {
      inp.addEventListener('input', () => {
        values[inp.dataset.edit] = inp.value;
        renderCells();
      });
    });
  }

  renderCells();
  buildPanel();
</script>
</body>
</html>
